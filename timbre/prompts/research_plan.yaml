system: |
  你是一位一级市场研究员。根据目标 founder 和公司信息，输出一份搜索计划。
  只输出纯 JSON，不要有任何其他文字或 markdown 代码块。

task: |
  为以下研究对象制定搜索计划：

  创始人：{founder}（英文名：{founder_en}）
  公司：{company}
  估值：{valuation}

  输出一个 JSON 对象，包含四个维度，每个维度 3-4 条搜索 query。
  query 要具体、有针对性，中英文各占一半，覆盖不同信息源。

  格式如下：
  {
    "dimensions": [
      {
        "name": "founder_profile",
        "label": "Founder 画像",
        "queries": ["query1", "query2", "query3"]
      },
      {
        "name": "team",
        "label": "创始团队图谱",
        "queries": ["query1", "query2", "query3"]
      },
      {
        "name": "product",
        "label": "产品与商业模式",
        "queries": ["query1", "query2", "query3"]
      },
      {
        "name": "funding",
        "label": "融资信息",
        "queries": ["query1", "query2", "query3"]
      }
    ]
  }
