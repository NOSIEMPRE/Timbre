task: |
  以下是关于「{founder}」和「{company}」的搜索结果，每条均已编号并附原文链接。
  调研日期：{date}

  你的任务是：从这些编号原文片段中提取事实，填入档案模板。

  规则（违反则输出无效）：
  1. 每一条事实后面必须标注来源编号，格式：[N]
  2. 只能使用下方编号片段中明确出现的内容，一字不得超出
  3. 片段中没有的信息一律写「未找到公开数据」
  4. 不得根据常识或推断补充任何内容，不得虚构任何数字、人名、机构

  ---

  {research_results}

  {extra_context}

  ---

  来源列表：
  {ref_list}

  ---

output_template: |
  # {founder} · {company}

  > {date} · 估值 {valuation}

  ---

  ## 核心判断

  （仅基于下方各节有编号来源支撑的事实，写 3-5 条判断，每条后标注依据来源 [N]。
  没有足够事实则少写，不得补充推断。）

  ---

  ## 创始人画像

  **背景与经历**
  （从编号片段中摘录创始人的教育背景、职业经历、创业动机，每条后标 [N]。
  未出现则写「未找到公开数据」。）

  **公开表达**
  （直接引用编号片段中出现的原话，标注 [N] 和发布时间。
  片段中无引语则写「未找到公开数据」。）

  ---

  ## 创始团队图谱

  **核心创始人**
  （列出编号片段中明确提及的联创姓名、背景、角色，每条标 [N]。
  未提及则写「未找到公开数据」。）

  **关键管理层**
  （列出编号片段中明确提及的高管，标 [N]。未提及则写「未找到公开数据」。）

  ---

  ## 公司与产品

  **核心产品**
  （摘录编号片段中对产品的描述，标 [N]。未找到则写「未找到公开数据」。）

  **商业模式**
  （摘录编号片段中关于收入模式、客户群体的描述，标 [N]。未找到则写「未找到公开数据」。）

  **竞争格局**
  （摘录编号片段中提及的竞品和差异化，标 [N]。未找到则写「未找到公开数据」。）

  ---

  ## 融资信息

  （仅列编号片段中明确出现的融资事件，格式：轮次 · 金额 · 估值 · 投资方 · 时间 [N]
  未在片段中出现的一律不列。）

  ---

  ## 信息源

  {ref_list}
