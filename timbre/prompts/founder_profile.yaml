task: |
  以下是关于「{founder}」和「{company}」的搜索结果原文，调研日期 {date}。
  每条搜索结果均已编号并附原始链接。

  规则（违反则输出无效）：
  1. 每一条具体事实后面必须标注来源编号 [N]
  2. 只能使用下方编号片段中明确出现的内容，不得超出
  3. 找不到的字段一律写「暂无公开数据」，不得留空，不得推断
  4. 优先使用精确数字（$46M），不使用模糊区间（数千万）
  5. 不得虚构任何人名、金额、日期、机构名

  ---

  {research_results}

  {extra_context}

  ---

  来源列表：
  {ref_list}

  ---

output_template: |
  # {founder} · {company}

  > {date} · 估值 {valuation}

  ---

  ## 一句话定位

  （从编号片段中提取："{company} 是一家 [做什么] 的 [公司类型]，服务 [目标客户]"。
  找不到则写「暂无公开数据」。标注来源 [N]。）

  ---

  ## 投资亮点与主要顾虑

  **亮点**（仅列有来源支撑的，bullet，每条标 [N]）
  **顾虑**（标注风险等级：P0 = 潜在致命 / P1 = 需深入核查 / P2 = 持续关注，每条标 [N]）

  ---

  ## 创始人画像

  **基本信息**
  - 全名：
  - 学历：（学校 · 专业 · 毕业年份，每段标 [N]，暂无则写「暂无公开数据」）
  - 工作经历：（公司 · 职位 · 起止时间 · 核心成就，每条标 [N]）
  - 是否连续创业者：（列历史公司、创立年份、结局，标 [N]，暂无则写「暂无公开数据」）

  **公开表达**
  （直接引用编号片段中的原话，注明来源 [N] 和发布时间。找不到写「暂无公开数据」。）

  **风险信号**
  （编号片段中出现的负面信号，P0/P1/P2 标注，每条标 [N]。暂无则写「暂无」。）

  ---

  ## 创始团队

  **联创**（姓名 · 职能 · 背景 · 与创始人关系，每人标 [N]，暂无写「暂无公开数据」）
  **关键管理层**（姓名 · 职位 · 背景，每条标 [N]，暂无写「暂无公开数据」）
  **团队规模**（总人数，如已知，标 [N]）

  ---

  ## 公司与产品

  **核心产品**（bullet，3–5条，每条标 [N]，暂无写「暂无公开数据」）
  **商业模式**（收费方式：订阅/按量/项目制/混合，标 [N]，暂无写「暂无公开数据」）
  **技术壁垒**（核心技术、自研情况，标 [N]，暂无写「暂无公开数据」）
  **主要竞品**（列名称 + 各自优劣势对比，标 [N]，暂无写「暂无公开数据」）

  ---

  ## 业务牵引力

  （以下各项均只填编号片段中明确出现的数据，暂无写「暂无公开数据」，每条标 [N]）
  - ARR/MRR：
  - 用户/客户数：
  - 增长率：
  - 关键客户：

  ---

  ## 融资信息

  （按时间倒序，仅列编号片段中出现的融资事件。
  投资机构名称一律用 [[机构名]] 格式，例如 [[Sequoia]]、[[红杉中国]]、[[a16z]]。）
  | 轮次 | 金额 | 日期 | 领投方 | 跟投方 | 来源 |
  |------|------|------|--------|--------|------|
  （未在片段中出现的一律不列）

  ---

  ## 近期动态

  （按时间倒序，每条格式：日期 · 事件 · [N]，仅来自编号片段）

  ---

  ## 信息源

  {ref_list}
