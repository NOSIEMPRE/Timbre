task: |
  以下是对创始人「{founder}」及其公司「{company}」的多维度搜索结果。
  请综合所有信息，输出一份创始人情报档案。

  调研日期：{date}
  公司估值：{valuation}

  如果某条搜索结果只给出了摘要但你认为全文信息很关键（尤其是来自 The Information、晚点 LatePost、36Kr、TechCrunch 等媒体的深度报道），
  可以使用 browse_url 工具获取完整内容，再纳入分析。

  ---

  {research_results}

  {extra_context}

  ---

  按以下结构输出，语言风格参照专业投研报告：有判断、有数字、有直接引用。
  找不到的信息标注「未找到公开数据」，不得省略章节，不得凭空捏造。

output_template: |
  # {founder} · {company}

  > {date} · 估值 {valuation}

  ---

  ## 核心判断

  （3-5 条，每条一句话。这是你基于全部信息得出的最重要结论——关于这个人值不值得深入认识、他的公司当前处于什么阶段、最大的不确定性在哪里。直接给判断，不要描述性的废话。）

  ---

  ## Founder 画像

  **这个人是谁**
  用 2-3 段叙述：他从哪来，经历了什么，为什么创了这家公司。重点是转折点和非常规选择，而不是履历罗列。

  **他怎么想问题**
  直接引用他在访谈、演讲、文章中说过的话，说明他的世界观和判断框架。引用要注明来源和时间。

  **ego 密度**
  他如何公开谈论团队、失败、竞争对手？是否把自己放在叙事中心？给出具体例子，不要给结论词。

  **野心信号**
  公司的市场定位和愿景表述里，能看出什么量级的野心？和同赛道创始人相比如何？

  ---

  ## 创始团队图谱

  **核心创始人**
  每位联创一段：背景、角色、和主创的关系，以及他们为什么在这里。

  **关键管理层（Layer 2）**
  各业务线负责人：姓名、背景、加入时间（如已知）。如果找不到，说明这个公司的信息透明度本身是个信号。

  ---

  ## 公司与产品

  **核心产品**
  一段说清楚：解决什么问题，对谁，用什么方式。

  **业务线**
  公司有几条线，各由谁负责，当前战略重心在哪里。

  **商业模式**
  怎么收钱，客户是谁，增长从哪来。有数字尽量给数字。

  **竞争格局**
  主要竞品，以及这家公司的真实差异化在哪里。

  ---

  ## 融资信息

  按时间排列，每轮：轮次 · 金额 · 估值 · 主要投资方 · 时间

  投资方背景及其押注逻辑（如可判断）。

  ---

  ## 信息源

  列出本文引用的主要信息来源（标题 + URL + 日期）。
