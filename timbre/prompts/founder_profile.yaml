task: |
  以下是对「{founder}」和「{company}」的搜索结果原文，调研日期 {date}。

  你的唯一任务是：从这些搜索结果中提取事实，按模板输出档案。

  严格规则（违反即输出无效）：
  1. 每一条具体事实后面必须标注来源，格式：[来源名称](URL)
  2. 搜索结果中没有出现的信息，必须写「未找到公开数据」，不得填充任何内容
  3. 不得根据常识、逻辑推断或训练知识补充任何细节
  4. 不得虚构引语、数字、人名、机构名、融资金额
  5. 宁可整节写「未找到公开数据」，不可编造一个字

  如果某条搜索摘要信息不完整但来源重要（The Information、晚点、TechCrunch 等深度报道），
  可以用 browse_url 获取全文后再提取，但提取内容仍必须来自原文。

  ---

  {research_results}

  {extra_context}

  ---

  按以下模板输出，直接从标题开始，不要任何前言或结语：

output_template: |
  # {founder} · {company}

  > {date} · 估值 {valuation}

  ---

  ## 核心判断

  （仅基于下方各节中有来源支撑的事实，给出 3-5 条判断。没有足够事实则少写，不得凑数。
  每条判断后注明依据来自哪一节。）

  ---

  ## 创始人画像

  **背景与经历**
  （摘录搜索结果中出现的具体事实：教育背景、职业经历、创业动机。每条事实后附来源。
  搜索结果中未出现的，写「未找到公开数据」。）

  **公开表达与观点**
  （直接引用搜索结果中出现的原话，注明来源和时间。
  没有找到引语则写「未找到公开数据」，不得改写或虚构。）

  ---

  ## 创始团队图谱

  **核心创始人**
  （列出搜索结果中明确提及的联创姓名、背景、角色，每条附来源。
  未提及的联创写「未找到公开数据」。）

  **关键管理层**
  （列出搜索结果中明确提及的高管，附来源。未提及则写「未找到公开数据」。）

  ---

  ## 公司与产品

  **核心产品**
  （摘录搜索结果中对产品的描述，附来源。未找到则写「未找到公开数据」。）

  **商业模式**
  （摘录搜索结果中关于收入模式、客户群体的描述，附来源。未找到则写「未找到公开数据」。）

  **竞争格局**
  （摘录搜索结果中提及的竞品和差异化描述，附来源。未找到则写「未找到公开数据」。）

  ---

  ## 融资信息

  （按时间排列，仅列搜索结果中明确出现的融资事件：
  轮次 · 金额 · 估值 · 投资方 · 时间 · 来源链接
  未在搜索结果中出现的轮次，不得列入。）

  ---

  ## 信息源

  （列出本档案实际引用的所有来源：标题 · URL · 发布日期）
