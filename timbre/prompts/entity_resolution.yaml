task: |
  用户输入了「{input}」。这可能是创始人姓名、公司名称或核心产品名称（中英文均有可能）。

  你的目标是通过网络搜索（最多 4 次）确认：这是哪家公司、谁是创始人。

  搜索策略：
  - 输入是英文单词时，直接搜「"{input}" startup founder」或「"{input}" company crunchbase」——
    带引号避免歧义，加 startup/company 缩小范围
  - 输入是中文时，搜「{input} 创始人」和「{input} founder」
  - 第一轮结果不清晰时，换更具体的关键词（加融资金额、所在城市、行业词等）
  - 找到明确实体后立即停止，不要继续搜索

  确认后，仅输出如下格式的纯 JSON，不要有任何其他文字：

  {
    "founder": "创始人姓名（优先中文，无中文则填英文）",
    "founder_en": "创始人英文姓名",
    "company": "公司名称",
    "product": "核心产品名称（若与公司名不同）",
    "valuation": "已知估值，如 $3B，未知填 unknown",
    "confirmed": true,
    "confidence": "high 或 medium 或 low"
  }

  如果搜索后仍无法确认真实存在的创始人或公司，将 confirmed 设为 false 并说明原因。
